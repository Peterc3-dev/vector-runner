name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    # The game imports pygame at module load. Use SDL's dummy drivers so the
    # headless runner can import it without a display or audio device. The
    # unit tests only exercise pure logic — no window or mixer is ever opened.
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Unit tests
        # Scoped to the pure-logic tests under tests/. Rendering, audio
        # synthesis, and the main loop are intentionally not exercised here.
        run: pytest -q tests
